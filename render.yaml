services:
  - type: web
    name: iot-cloud-platform
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r server/requirements_cloud.txt
    startCommand: cd server && python app_cloud.py
    envVars:
      - key: MQTT_HOST
        value: 81225862ede44a59b3b71c4455cb5f2.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: 8883
      - key: MQTT_USER
        value: iotadmin
      - key: MQTT_PASS
        value: Li2223841219
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /api/health