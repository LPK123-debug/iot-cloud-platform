; PlatformIO Configuration
; IoT ESP8266 Device

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Required libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.0
    adafruit/DHT sensor library@^1.4.0
    adafruit/Adafruit Unified Sensor@^1.1.0
    claws/BH1750@^1.3.0
